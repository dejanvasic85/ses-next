name: Google reviews
on:
  schedule:
    - cron: 0 18 * * *
  workflow_dispatch:
env:
  GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

jobs:
  update-reviews:
    name: Update google rating data
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - name: Check out repository code
        uses: actions/checkout@v7
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Install tools
        run: mise install
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run
        run: |
          pnpm update:reviews
      - name: Format
        run: pnpm format
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: feat/update-google-reviews
          title: 'feat: Google ratings updates'
          body: |
            This is an automated pull request to update the google reviews.
          commit-message: 'feat: Google ratings updates'
          labels: 'content'
          token: ${{ secrets.ACTIONS_TOKEN }}

      - name: Enable auto-merge for PR
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --squash ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
